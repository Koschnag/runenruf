name: Release

# Ein Tag v* erzeugt fertig compilierte Releases — aber nur durch das CDD-Gate hindurch
# (spec-release-pipeline, adr-006). Plan und Auslieferung bleiben synchron.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # Reproduzierbarkeit: Runenruf-Release gegen eine gepinnte CDD-Version (adr-006).
  CDD_REF: v0.3.0

jobs:
  gate:
    name: CDD-Gate (Modell konvergiert?)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: CDD auschecken (gepinnt)
        uses: actions/checkout@v4
        with:
          repository: Koschnag/cong-driven-development
          ref: ${{ env.CDD_REF }}
          path: .cdd
      - name: Tests
        run: dotnet test tests/Runenruf.Tests --nologo
      - name: Modell validieren + Konvergenz messen (Gate)
        run: |
          dotnet run --project .cdd/src/Cdd.Cli -- validate
          dotnet run --project .cdd/src/Cdd.Cli -- sync-code
          dotnet run --project .cdd/src/Cdd.Cli -- sync-tests
      - name: Release-Notes aus dem Modell generieren
        run: |
          mkdir -p artefakte
          {
            echo "## Runenruf ${GITHUB_REF_NAME}"
            echo ""
            echo "Fertig compiliert für M1 Mac (osx-arm64), Windows (win-x64), Linux (linux-x64) und Raspberry Pi 5 (linux-arm64)."
            echo "Geprüft durch das CDD-Gate gegen Modell-Stand \`${CDD_REF}\` — Auslieferung nur bei konvergiertem Modell (adr-006)."
            echo ""
            echo "<details><summary>Modell-Kontext (CDD export-context)</summary>"
            echo ""
            echo '```markdown'
            dotnet run --project .cdd/src/Cdd.Cli -- export-context
            echo '```'
            echo ""
            echo "</details>"
          } > artefakte/notes.md
          cp artefakte/notes.md "$GITHUB_STEP_SUMMARY"
      - name: Notes als Artefakt
        uses: actions/upload-artifact@v4
        with:
          name: notes
          path: artefakte/notes.md

  build:
    name: Build ${{ matrix.rid }}
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       rid: osx-arm64 }    # Apple Silicon — Primärgerät
          - { os: windows-latest, rid: win-x64 }
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: ubuntu-latest,  rid: linux-arm64 }  # Raspberry Pi 5 — Min-Spec
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Version aus Tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Spiel + AssetForge publizieren (self-contained, single-file)
        shell: bash
        run: |
          for proj in src/Runenruf.Game tools/AssetForge; do
            dotnet publish "$proj" -c Release -r ${{ matrix.rid }} \
              --self-contained true \
              -p:PublishSingleFile=true -p:Version=${VERSION} \
              -o out/${{ matrix.rid }}
          done
      - name: Packen
        shell: bash
        run: |
          mkdir -p dist
          cp README.md LICENSE out/${{ matrix.rid }}/ 2>/dev/null || true
          tar -czf dist/runenruf-${{ env.VERSION }}-${{ matrix.rid }}.tar.gz -C out/${{ matrix.rid }} .
      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.rid }}
          path: dist/*.tar.gz

  release:
    name: GitHub-Release veröffentlichen
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: einsammeln
      - name: Release anlegen
        uses: softprops/action-gh-release@v2
        with:
          name: Runenruf ${{ github.ref_name }}
          body_path: einsammeln/notes/notes.md
          files: einsammeln/bin-*/*.tar.gz
          fail_on_unmatched_files: true
